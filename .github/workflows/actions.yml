name: Actions

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build & Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --fix-missing ffmpeg python3-tk

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: make install

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --fix-missing ffmpeg python3-tk

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: make install

      - name: Run coverage
        run: make coverage
